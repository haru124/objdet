# =============================================================================
# Experiment 01 — Quick smoke-test
# Overrides only what differs from config.yaml
# =============================================================================
experiment_name: exp_01_smoke_test

training:
  epochs: 2
  batch_size: 4
  optimizer: "sgd"
  learning_rate: 0.002

model:
  backbone_weights: "local"
  local_weights_path: "weights/fasterrcnn_resnet50_fpn_coco.pth"
  trainable_backbone_layers: 1    # freeze more layers for faster iteration

loss:
  classification: "cross_entropy"
  box_regression: "smooth_l1"

checkpointing:
  save_dir: outputs/checkpoints/  
  save_every: 1                      # Save checkpoint every N epochs
  keep_last: 3                       # How many checkpoints to retain


logging:
  log_every: 100

debug:
  enabled: false    # print tensor shapes at each stage before training
