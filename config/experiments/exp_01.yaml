# Experiment 01: Quick smoke-test with smaller input and fewer epochs
# Inherits all values from config/config.yaml; only overrides are listed here.

experiment_name: exp_01_smoke_test

training:
  epochs: 5
  batch_size: 1
  learning_rate: 0.002

model:
  trainable_backbone_layers: 1      # Freeze more layers for faster iteration

logging:
  log_every: 10