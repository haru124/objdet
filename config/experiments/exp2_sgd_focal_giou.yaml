# =============================================================================
# Experiment 02 — SGD + Focal loss + GIoU box regression
# =============================================================================
experiment_name: exp2_sgd_focal_giou

training:
  epochs: 10   #30
  batch_size: 4
  optimizer: "sgd" # SGD is a simple and robust optimization algorithm that works well for many deep learning tasks
  learning_rate: 0.002
  #lr_scheduler: "cosine" # Cosine annealing scheduler gradually reduces the learning rate following a cosine curve, which can help the model converge better and escape local minima compared to step decay schedulers. It often leads to improved performance in object detection tasks.
 
model:
  backbone_weights: "local"
  local_weights_path: "weights/fasterrcnn_resnet50_fpn_coco.pth"
  load_backbone_only: false   # Load only the ResNet50 body weights, not the RPN or ROI heads, for faster iteration during early experimentation
  trainable_backbone_layers: 2

loss:
  classification: "focal_loss"     # switch to focal loss for classification to handle class imbalance better
  focal_alpha: 0.25
  focal_gamma: 2.0
  box_regression: "giou"


checkpointing:
  save_dir: outputs/checkpoints/  
  save_every: 1          #2             # Save checkpoint every N epochs
  keep_last: 3                       # How many checkpoints to retain


logging:
  log_every: 100  # Log training metrics every N iterations (batches)
